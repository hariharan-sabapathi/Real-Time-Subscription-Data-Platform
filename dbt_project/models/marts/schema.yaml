version: 2

models:

  - name: monthly_recurring_revenue
    description: Monthly recurring revenue across all active subscriptions.
    columns:
      - name: revenue_month
        description: Month of revenue aggregation
        tests:
          - not_null

      - name: mrr
        description: Total monthly recurring revenue
        tests:
          - not_null

  - name: revenue_by_plan
    description: Revenue distribution grouped by subscription plan.
    columns:
      - name: plan_name
        description: Name of the subscription plan
        tests:
          - not_null

      - name: total_revenue
        description: Total revenue generated by this plan
        tests:
          - not_null

  - name: daily_active_subscriptions
    description: Number of active subscriptions per day.
    columns:
      - name: activity_date
        description: Date of activity
        tests:
          - not_null

      - name: active_subscriptions
        description: Count of active subscriptions
        tests:
          - not_null

  - name: churn_events
    description: Subscriptions that have been cancelled.
    columns:
      - name: subscription_id
        tests:
          - not_null

      - name: churn_date
        tests:
          - not_null